name: Build Meeting PDFs

on:
  workflow_dispatch:
  push:
    paths:
      - "compte-rendus/CAA-FR_compte-rendu_*.md"
      - ".github/workflows/build-meeting-pdfs.yml"
  pull_request:
    paths:
      - "compte-rendus/CAA-FR_compte-rendu_*.md"
      - ".github/workflows/build-meeting-pdfs.yml"

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push PDFs back to repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git diff base..head and commits

      - name: Compile only changed meeting markdown files into pdf/
        shell: bash
        env:
          PANDOC_LATEX_IMAGE: pandoc/latex:latest-ubuntu
        run: |
          set -euo pipefail

          mkdir -p pdf

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mapfile -t files < <(git ls-files 'compte-rendus/CAA-FR_compte-rendu_*.md' | sort -u)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            mapfile -t files < <(git diff --name-only "$base" "$head" -- '**/CAA-FR_compte-rendu_*.md' | sort -u)
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              mapfile -t files < <(git ls-files 'compte-rendus/CAA-FR_compte-rendu_*.md' | sort -u)
            else
              mapfile -t files < <(git diff --name-only "$base" "$head" -- '**/CAA-FR_compte-rendu_*.md' | sort -u)
            fi
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No matching meeting markdown files changed."
            exit 0
          fi

          docker run --rm \
            --user root \
            -v "$PWD:/data" \
            -w /data \
            --entrypoint bash \
            "$PANDOC_LATEX_IMAGE" \
            -lc '
              set -euo pipefail

              apt-get update
              apt-get install -y --no-install-recommends fontconfig fonts-linuxlibertine
              rm -rf /var/lib/apt/lists/*
              fc-cache -f
              fc-match "Linux Libertine O"

              for file in "$@"; do
                # Put PDFs directly under pdf/
                out="pdf/$(basename "${file%.md}").pdf"

                echo "Compiling $file -> $out"
                pandoc "$file" --pdf-engine=xelatex -o "$out"
              done
            ' bash "${files[@]}"

      - name: Upload PDFs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: meeting-pdfs
          path: pdf/**/*.pdf
          if-no-files-found: ignore

      - name: Commit PDFs to repo (push only)
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        shell: bash
        run: |
          set -euo pipefail

          # If nothing changed, don't commit
          if git status --porcelain | grep -q '^??\|^ M\|^A '; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add pdf/
            git commit -m "Update compiled meeting PDFs" || exit 0
            git push
          else
            echo "No changes to commit."
          fi
