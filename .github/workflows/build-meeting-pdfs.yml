name: Build Meeting PDF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "compte-rendus/CAA-FR_compte-rendu_*.md"
      - ".github/workflows/build-meeting-pdfs.yml"

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    container:
      image: pandoc/latex:latest-ubuntu
      options: --user root
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - name: Install missing tools
        run: |
          set -euo pipefail

          apt-get update
          apt-get install -y --no-install-recommends fontconfig fonts-linuxlibertine git ca-certificates
          fc-cache -f

      - name: Check out main
        uses: actions/checkout@v4

      - name: Build the PDF
        run: |
          set -euo pipefail

          mkdir -p pdf

          meeting_file="$(git ls-files 'compte-rendus/CAA-FR_compte-rendu_*.md' | sort | tail -n 1)"

          if [ -z "$meeting_file" ]; then
            echo "No meeting file found."
            exit 1
          fi

          pdf_file="pdf/$(basename "${meeting_file%.md}").pdf"

          echo "Building: $meeting_file"
          echo "PDF path: $pdf_file"

          pandoc "$meeting_file" --pdf-engine=xelatex -o "$pdf_file"

      - name: Upload PDF to this workflow run
        uses: actions/upload-artifact@v4
        with:
          name: meeting-pdf
          path: pdf/*.pdf

      - name: Publish PDF branch
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          publish_dir="$RUNNER_TEMP/pdf-branch"
          mkdir -p "$publish_dir"
          cp pdf/*.pdf "$publish_dir"/

          # This branch is replaced each time and contains only the PDF.
          cd "$publish_dir"

          git init
          git checkout -b pdf
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update compiled meeting PDF"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin pdf
